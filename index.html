<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOHN MORGAN ONLINE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html,body{
    width:100%;
    min-height:100vh;
    overflow-x:hidden;
    background:#050505;
}

body{
    color:white;
    background:
    radial-gradient(circle at center, rgba(214,168,79,.10), transparent 38%),
    linear-gradient(rgba(0,0,0,.18),rgba(0,0,0,.50)),
    url("main-bg-pc.png");
    background-size:cover;
    background-position:center center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.main{
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px 15px;
}

/* PREMIUM CARD */

.card{
    position:relative;
    width:100%;
    max-width:520px;
    padding:42px 36px 26px;
    border-radius:26px;
    text-align:center;
    overflow:hidden;
    background:
    linear-gradient(180deg, rgba(8,10,12,.78), rgba(0,0,0,.58));
    border:1px solid rgba(255,210,115,.72);
    box-shadow:
    0 0 0 1px rgba(255,255,255,.04) inset,
    0 0 24px rgba(214,168,79,.28),
    0 22px 70px rgba(0,0,0,.82);
    backdrop-filter:blur(7px);
    -webkit-backdrop-filter:blur(7px);
}

.card:before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
    radial-gradient(circle at top center, rgba(214,168,79,.20), transparent 34%),
    linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
    opacity:.9;
}

.card:after{
    content:"";
    position:absolute;
    top:-2px;
    left:50%;
    transform:translateX(-50%);
    width:115px;
    height:3px;
    border-radius:999px;
    background:#ffd77b;
    box-shadow:0 0 18px #ffd77b;
}

.logo{
    position:relative;
    z-index:1;
    width:112px;
    height:112px;
    margin:0 auto 20px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid #d6a84f;
    box-shadow:
    0 0 0 4px rgba(214,168,79,.12),
    0 0 26px rgba(214,168,79,.80),
    0 0 60px rgba(214,168,79,.30);
}

.logo:before{
    content:"";
    position:absolute;
    inset:-8px;
    border-radius:50%;
    border:1px solid rgba(255,215,120,.45);
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    position:relative;
    z-index:1;
    font-size:54px;
    line-height:.98;
    letter-spacing:5px;
    margin-bottom:12px;
    color:white;
    text-shadow:
    0 2px 0 rgba(0,0,0,.7),
    0 0 22px rgba(0,0,0,.95);
}

.subtitle{
    position:relative;
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:13px;
    color:#d6a84f;
    font-size:18px;
    font-weight:bold;
    letter-spacing:5px;
    text-transform:uppercase;
    margin-bottom:26px;
    text-shadow:0 0 14px rgba(214,168,79,.35);
}

.subtitle:before,
.subtitle:after,
.section-title:before,
.section-title:after{
    content:"";
    width:46px;
    height:1px;
    background:linear-gradient(90deg, transparent, #d6a84f);
    opacity:.9;
}

.subtitle:after,
.section-title:after{
    background:linear-gradient(90deg, #d6a84f, transparent);
}

/* PREMIUM INFO ROWS */

.info-box{
    position:relative;
    z-index:1;
    margin:0 0 24px;
    padding:0;
    border-radius:0;
    background:transparent;
    border:0;
    text-align:left;
    line-height:1;
    font-size:15px;
    color:white;
    text-shadow:none;
}

.info-box div{
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    gap:16px;
    min-height:45px;
    margin:6px 0;
    padding:0 18px;
    border-radius:10px;
    background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
    border:1px solid rgba(255,255,255,.12);
    box-shadow:
    0 0 0 1px rgba(0,0,0,.25) inset,
    0 10px 24px rgba(0,0,0,.22);
}

.info-box strong{
    color:#d6a84f;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    -webkit-text-stroke:0;
    text-shadow:0 0 10px rgba(214,168,79,.25);
}

.info-box span{
    color:#ffffff;
    text-align:right;
    font-weight:600;
    -webkit-text-stroke:0;
    text-shadow:0 0 10px rgba(0,0,0,.70);
}

/* SECTION */

.section-title{
    position:relative;
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin:4px 0 16px;
    font-size:14px;
    letter-spacing:3px;
    color:#f1f1f1;
    text-transform:uppercase;
    text-shadow:0 0 10px rgba(0,0,0,.8);
}

/* PREMIUM BUTTONS */

.btn{
    position:relative;
    z-index:1;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:13px;
    margin:12px 0;
    padding:15px 18px;
    border-radius:13px;
    text-decoration:none;
    font-size:20px;
    font-weight:900;
    letter-spacing:.5px;
    color:white;
    background:linear-gradient(180deg, rgba(7,9,13,.72), rgba(0,0,0,.58));
    border:1px solid rgba(255,255,255,.16);
    box-shadow:
    0 0 0 1px rgba(0,0,0,.45) inset,
    0 14px 26px rgba(0,0,0,.28);
    transition:.25s ease;
    overflow:hidden;
}

.btn:before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
    transform:translateX(-110%);
    transition:.55s ease;
}

.btn:hover:before{
    transform:translateX(110%);
}

.btn:hover{
    transform:translateY(-2px) scale(1.015);
    border-color:rgba(214,168,79,.55);
    box-shadow:
    0 0 0 1px rgba(214,168,79,.20) inset,
    0 0 22px rgba(214,168,79,.24),
    0 16px 32px rgba(0,0,0,.36);
}

.btn img{
    width:30px;
    height:30px;
    object-fit:contain;
    filter:drop-shadow(0 0 8px rgba(255,255,255,.18));
}

.btn:nth-of-type(1){
    border-color:rgba(110,120,255,.55);
    box-shadow:0 0 18px rgba(88,101,242,.18);
}

.btn:nth-of-type(2){
    border-color:rgba(0,245,255,.50);
    box-shadow:0 0 18px rgba(0,245,255,.14);
}

.btn:nth-of-type(3){
    border-color:rgba(255,70,70,.50);
    box-shadow:0 0 18px rgba(255,0,0,.14);
}

.btn:nth-of-type(4){
    border-color:rgba(214,168,79,.56);
    box-shadow:0 0 18px rgba(214,168,79,.18);
}

/* FOOTER */

.footer{
    position:relative;
    z-index:1;
    margin-top:24px;
    color:#ddd;
    font-size:13px;
    text-shadow:0 0 10px rgba(0,0,0,.9);
}

.footer a{
    color:#d6a84f;
    text-decoration:none;
    font-weight:bold;
    transition:.25s;
}

.footer a:hover{
    color:white;
    text-shadow:0 0 10px #d6a84f;
}

/* MOBILE */

@media(max-width:900px){
    body{
        background:
        radial-gradient(circle at center, rgba(214,168,79,.08), transparent 42%),
        linear-gradient(rgba(0,0,0,.20),rgba(0,0,0,.48)),
        url("main-bg-mobile.png");
        background-size:cover;
        background-position:center center;
        background-repeat:no-repeat;
        background-attachment:scroll;
    }

    .main{
        min-height:100svh;
        padding:8px 10px;
        align-items:center;
        justify-content:center;
    }

    .card{
        max-width:305px;
        padding:20px 15px 15px;
        border-radius:21px;
        backdrop-filter:blur(5px);
        -webkit-backdrop-filter:blur(5px);
    }

    .logo{
        width:68px;
        height:68px;
        margin-bottom:10px;
        border-width:2px;
    }

    h1{
        font-size:27px;
        line-height:1;
        letter-spacing:2px;
        margin-bottom:6px;
    }

    .subtitle{
        font-size:10px;
        letter-spacing:3px;
        gap:8px;
        margin-bottom:12px;
    }

    .subtitle:before,
    .subtitle:after,
    .section-title:before,
    .section-title:after{
        width:24px;
    }

    .info-box{
        margin:0 0 12px;
        font-size:10px;
    }

    .info-box div{
        min-height:31px;
        margin:5px 0;
        padding:0 10px;
        border-radius:9px;
        gap:8px;
    }

    .info-box strong{
        font-size:9px;
        letter-spacing:.7px;
    }

    .info-box span{
        font-size:10px;
    }

    .section-title{
        font-size:9px;
        letter-spacing:1.4px;
        gap:7px;
        margin:6px 0 9px;
        line-height:1.2;
    }

    .btn{
        margin:7px 0;
        padding:9px 10px;
        border-radius:11px;
        font-size:13px;
        gap:9px;
    }

    .btn img{
        width:19px;
        height:19px;
    }

    .footer{
        margin-top:10px;
        font-size:9px;
    }
}

</style>
